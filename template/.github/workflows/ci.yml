# Base CI — the backstop the local pre-commit hook can't be --no-verify'd past. Runs the same
# universal governance + hygiene gate over the whole tree on every push to main and every PR.
# A language stack overlay extends this (lint/type/test matrix) on top. Kept STATIC and single-job
# (no matrix, no `${{ }}`) so the rendered file is verbatim and every Action stays SHA-pinned.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gate:
    name: governance gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uvx pre-commit run --all-files
